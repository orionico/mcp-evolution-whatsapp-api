services:
  mcp-evolution-whatsapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-evolution-whatsapp
    restart: unless-stopped
    environment:
      - MCP_TRANSPORT=http
      - PORT=3000
      - MCP_HTTP_AUTH_TOKEN=${MCP_HTTP_AUTH_TOKEN}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_DEFAULT_INSTANCE=${EVOLUTION_DEFAULT_INSTANCE}
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.mcp-evolution.rule=Host(`mcp.orionic.com.br`) && PathPrefix(`/mcp-evolution-whatsapp-api`)
      - traefik.http.routers.mcp-evolution.entrypoints=websecure
      - traefik.http.routers.mcp-evolution.tls.certresolver=letsencrypt
      - traefik.http.services.mcp-evolution.loadbalancer.server.port=3000
    deploy:
      resources:
        limits:
          memory: 256M

# Rede externa do Traefik: "web"
# Certifique-se de que esta rede ja existe antes do deploy:
#   docker network ls | grep web
networks:
  web:
    external: true
